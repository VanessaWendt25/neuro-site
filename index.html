<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #151515;
      --muted: #7d766e;
      --soft: #a0988e;
      --line: #ddd5ca;
      --accent: #8b7650;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 8vh 7vw 7vh 7vw;
    }

    .topnote {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 11vh;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 7vw;
      align-items: start;
    }

    .brand {
      max-width: 900px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(92px, 11vw, 190px);
      line-height: 0.88;
      letter-spacing: 0.01em;
      margin: 0 0 2.2rem 0;
    }

    .subtitle {
      font-size: 21px;
      line-height: 1.4;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .side {
      padding-top: 1.5vh;
      max-width: 400px;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(34px, 3vw, 52px);
      line-height: 1.02;
      margin: 0 0 2rem 0;
    }

    .city-highlight {
      color: var(--accent);
    }

    .waiting {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
    }

    .waiting a,
    .email a,
    .place a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: opacity 0.2s ease, border-color 0.2s ease;
    }

    .waiting a:hover,
    .email a:hover,
    .place a:hover {
      opacity: 0.72;
      border-color: currentColor;
    }

    .locations {
      margin-top: 14vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
      padding-top: 2rem;
      border-top: 1px solid var(--line);
    }

    .location {
      max-width: 420px;
    }

    .city {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(28px, 2.2vw, 42px);
      line-height: 1;
      margin-bottom: 10px;
      color: var(--accent);
    }

    .place {
      font-size: 16px;
      line-height: 1.6;
      color: var(--muted);
    }

    .footer {
      margin-top: 10vh;
      padding-top: 1.6rem;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2rem;
    }

    .footer-note {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .email {
      font-size: 18px;
      color: var(--text);
    }

    @media (max-width: 980px) {
      .page {
        padding: 6vh 6vw 6vh 6vw;
      }

      .topnote {
        margin-bottom: 8vh;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .side {
        max-width: none;
        padding-top: 0;
      }

      .title {
        font-size: clamp(64px, 16vw, 120px);
      }

      .subtitle {
        font-size: 17px;
      }

      .launch {
        font-size: clamp(30px, 8vw, 46px);
        max-width: 10ch;
      }

      .locations {
        grid-template-columns: 1fr;
        gap: 2.5rem;
        margin-top: 10vh;
      }

      .footer {
        flex-direction: column;
        align-items: flex-start;
        margin-top: 8vh;
      }

      .email {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="topnote">Neurofeedback & Psychotherapy</div>

    <section class="hero">
      <div class="brand">
        <h1 class="title">
          THE<br>
          NEURO<br>
          CENTRE
        </h1>

        <div class="subtitle">
          Neurofeedback & Psychotherapy
        </div>
      </div>

      <div class="side">
        <div class="launch">
          Coming to <span class="city-highlight">Birr</span> and <span class="city-highlight">Athlone</span> this summer
        </div>

        <div class="waiting">
          Join the waiting list —
          <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
        </div>
      </div>
    </section>

    <section class="locations">
      <div class="location">
        <div class="city">Birr</div>
        <div class="place">@ The Space Above</div>
      </div>

      <div class="location">
        <div class="city">Athlone</div>
        <div class="place">@ The Athlone Care Clinic</div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer-note">Enquiries</div>
      <div class="email">
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>
    </footer>

  </div>
</body>
</html>
