<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f8f7f5;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
    }

    .wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      padding: 8vh 8vw;
      box-sizing: border-box;
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .tagline {
      font-size: 12px;
      letter-spacing: 3px;
      color: #888;
      margin-bottom: 40px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 9vw;
      line-height: 0.85;
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .locations {
      font-family: 'Playfair Display', serif;
      font-size: 6vw;
      line-height: 1;
      margin-bottom: 30px;
    }

    .sub {
      font-size: 14px;
      color: #777;
      margin-bottom: 40px;
    }

    .cta {
      font-size: 14px;
      color: #555;
    }

    .cta a {
      text-decoration: none;
      color: #1a1a1a;
      border-bottom: 1px solid #ccc;
    }

    @media (max-width: 768px) {
      .wrapper {
        grid-template-columns: 1fr;
        padding: 6vh 6vw;
        text-align: center;
      }

      .title {
        font-size: 16vw;
      }

      .locations {
        font-size: 10vw;
      }

      .right {
        margin-top: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="left">
      <div class="tagline">NEUROFEEDBACK & PSYCHOTHERAPY</div>

      <div class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </div>
    </div>

    <div class="right">
      <div class="locations">
        BIRR<br>
        ATHLONE
      </div>

      <div class="sub">
        Launching this summer
      </div>

      <div class="cta">
        Join the waiting list —
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>
    </div>
  </div>
</body>
</html>
