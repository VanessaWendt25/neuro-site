<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #7a736a;
      --accent: #ff5a1f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 5vh 6vw 3vh 6vw;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 6vw;
      align-items: start;
    }

    .left-block {
      min-width: 0;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(82px, 10vw, 175px);
      line-height: 0.84;
      margin: 0 0 1.2rem 0;
    }

    .subtitle {
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .side {
      width: 420px;
      max-width: 420px;
      justify-self: end;
      padding-top: 0.5vh;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 3vw, 52px);
      line-height: 0.98;
      margin: 0 0 1.2rem 0;
    }

    .city-highlight {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 400;
      color: var(--accent);
    }

    .waiting {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .waiting a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    .band {
      margin-top: 2vh;
      margin-bottom: 1.5vh;
      background: var(--accent);
      padding: 1.5rem 6vw;
      margin-left: calc(-6vw);
      margin-right: calc(-6vw);
    }

    .band-text {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(34px, 3.6vw, 68px);
      line-height: 1.02;
      color: #ffffff;
      margin: 0;
    }

    .locations {
      margin-top: 0.5vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
      padding-top: 0;
      border-top: none;
    }

    .city {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(22px, 1.7vw, 32px);
      margin: 0 0 4px 0;
    }

    .place {
      font-size: 13px;
      color: var(--accent);
      margin: 0;
    }

    @media (max-width: 1100px) {
      .hero {
        grid-template-columns: 1fr 360px;
      }

      .side {
        width: 360px;
        max-width: 360px;
      }

      .title {
        font-size: clamp(76px, 9vw, 150px);
      }
    }

    @media (max-width: 900px) {
      .page {
        padding: 6vh 6vw 4vh 6vw;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .side {
        width: 100%;
        max-width: 420px;
        justify-self: start;
        padding-top: 0;
      }

      .title {
        font-size: clamp(64px, 17vw, 120px);
      }

      .launch {
        font-size: clamp(28px, 8vw, 44px);
      }

      .band {
        margin-top: 1.5rem;
        margin-bottom: 1.25rem;
        padding: 1.2rem 6vw;
      }

      .band-text {
        font-size: clamp(28px, 8vw, 42px);
      }

      .locations {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }
  </style>
</head>

<body>

<div class="page">

  <section class="hero">
    <div class="left-block">
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>

      <div class="subtitle">
        Neurofeedback & Psychotherapy
      </div>
    </div>

    <div class="side">
      <div class="launch">
        Coming to<br>
        <span class="city-highlight">Birr</span> and<br>
        <span class="city-highlight">Athlone</span><br>
        this<br>
        summer
      </div>

      <div class="waiting">
        Join the waiting list —
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>
    </div>
  </section>

  <section class="band">
    <p class="band-text">Beyond words, regulation begins</p>
  </section>

  <section class="locations">
    <div>
      <h2 class="city">Birr</h2>
      <p class="place">@ The Space Above</p>
    </div>

    <div>
      <h2 class="city">Athlone</h2>
      <p class="place">@ The Athlone Care Clinic</p>
    </div>
  </section>

</div>

</body>
</html>
