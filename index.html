<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Neuro Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Libre+Franklin:wght@300;400&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #f8f7f5;
  --text: #1a1a1a;
  --accent: #d4a017;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Libre Franklin', sans-serif;
}

.wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
  padding: 8vh 8vw;
  box-sizing: border-box;
}

/* LEFT */

.left {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 9vw;
  line-height: 0.85;
  margin-bottom: 30px;
}

.tagline {
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--accent);
  margin-top: 10px;
}

/* RIGHT */

.right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
}

.headline {
  font-family: 'Playfair Display', serif;
  font-size: 3.2vw;
  line-height: 1.2;
  margin-bottom: 30px;
}

.city-highlight {
  font-family: 'Libre Franklin', sans-serif;
  font-weight: 300;
  color: var(--accent);
}

.cta {
  font-size: 14px;
  color: #666;
}

.cta a {
  text-decoration: none;
  color: var(--text);
  border-bottom: 1px solid #ccc;
}

/* BOTTOM */

.bottom {
  position: absolute;
  bottom: 8vh;
  left: 8vw;
  right: 8vw;
  display: flex;
  justify-content: space-between;
  font-family: 'Playfair Display', serif;
}

.location {
  font-size: 22px;
}

.sub {
  font-family: 'Libre Franklin', sans-serif;
  font-size: 14px;
  color: var(--accent);
  margin-top: 6px;
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="left">
    <div class="title">
      THE<br>
      NEURO<br>
      CENTRE
    </div>

    <div class="tagline">
      NEUROFEEDBACK & PSYCHOTHERAPY
    </div>
  </div>

  <div class="right">
    <div class="headline">
      Coming to <span class="city-highlight">Birr</span> and <span class="city-highlight">Athlone</span> this summer
    </div>

    <div class="cta">
      Join the waiting list — 
      <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
    </div>
  </div>

</div>

<div class="bottom">

  <div>
    <div class="location">Birr</div>
    <div class="sub">@ The Space Above</div>
  </div>

  <div>
    <div class="location">Athlone</div>
    <div class="sub">@ The Athlone Care Clinic</div>
  </div>

</div>

</body>
</html>
