<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #7a736a;
      --accent: #ff5a1f;
      --line: #ddd5ca;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;

      /* 🔧 reduced top + bottom space ONLY */
      padding: 4vh 6vw 1.5vh 6vw;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 7vw;
      align-items: start;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;

      /* 🔧 reduced slightly (~5px effect) */
      font-size: clamp(95px, 11.5vw, 195px);

      line-height: 0.85;
      margin: 0 0 1.2rem 0;
    }

    .subtitle {
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .side {
      padding-top: 1vh; /* 🔧 slightly reduced */
      max-width: 380px;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 3vw, 54px);
      line-height: 1.05;
      margin-bottom: 1.5rem; /* 🔧 tighter */
    }

    .city-highlight {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 300;
      color: var(--accent);
    }

    .waiting {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .waiting a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    /* 🔥 ORANGE BAND (unchanged visually, just moved up slightly) */
    .band {
      margin-top: 2vh;      /* 🔧 was larger before */
      margin-bottom: 0.8vh; /* 🔧 tighter */

      background: var(--accent);
      padding: 1.6rem 6vw;

      margin-left: calc(-6vw);
      margin-right: calc(-6vw);
    }

    .band-text {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(40px, 4vw, 70px);
      color: #ffffff;
      margin: 0;
    }

    .locations {
      margin-top: 0; /* 🔧 removed gap above */
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6vw;

      /* ❌ removed grey divider completely */
      padding-top: 0;
      border-top: none;
    }

    .city {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(24px, 1.8vw, 34px);
      margin-bottom: 4px;
    }

    .place {
      font-size: 14px;
      color: var(--accent);
    }

    @media (max-width: 980px) {
      .page { padding: 6vh 6vw 3vh 6vw; }

      .hero {
        grid-template-columns: 1fr;
        gap: 3rem;
      }

      .title {
        font-size: clamp(70px, 18vw, 130px);
      }

      .launch {
        font-size: clamp(32px, 8vw, 48px);
      }

      .locations {
        grid-template-columns: 1fr;
        gap: 2.5rem;
        margin-top: 6vh;
      }
    }

  </style>
</head>

<body>

<div class="page">

  <section class="hero">

    <div>
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>

      <div class="subtitle">
        Neurofeedback & Psychotherapy
      </div>
    </div>

    <div class="side">

      <div class="launch">
        Coming to <span class="city-highlight">Birr</span> and <span class="city-highlight">Athlone</span><br>
        this summer
      </div>

      <div class="waiting">
        Join the waiting list —
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>

    </div>

  </section>

  <section class="band">
    <p class="band-text">Beyond words, regulation begins</p>
  </section>

  <section class="locations">

    <div>
      <div class="city">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div>
      <div class="city">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>

  </section>

</div>

</body>
</html>
