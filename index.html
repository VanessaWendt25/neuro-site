<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #7a736a;
      --line: #ddd5ca;
      --accent: #ff5a1f;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
      height: 100%;
    }

    body {
      overflow: hidden;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 4.5vh 6vw 3vh 6vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 6vw;
      align-items: start;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(78px, 9vw, 155px);
      line-height: 0.84;
      margin: 0 0 1.2rem 0;
    }

    .subtitle {
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .right-block {
      padding-top: 0.5vh;
      max-width: 360px;
      justify-self: end;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 3vw, 50px);
      line-height: 0.96;
      margin: 0 0 1.2rem 0;
    }

    .city-highlight {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 400;
      color: var(--accent);
    }

    .waiting {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    .waiting a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    .band {
      margin: 2.2vh 0 2vh 0;
      background: var(--accent);
      padding: 1.2rem 6vw;
      margin-left: calc(-6vw);
      margin-right: calc(-6vw);
    }

    .band-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 3vw, 56px);
      line-height: 1.02;
      color: var(--white);
      margin: 0;
    }

    .locations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
      padding-top: 1.2rem;
      border-top: 1px solid var(--line);
      margin-top: 0.5vh;
    }

    .location-title {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(22px, 1.7vw, 32px);
      margin: 0 0 4px 0;
    }

    .place {
      font-size: 13px;
      color: var(--accent);
      margin: 0;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .page {
        height: auto;
        min-height: 100vh;
        padding: 5vh 6vw 4vh 6vw;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .title {
        font-size: clamp(64px, 17vw, 120px);
      }

      .launch {
        font-size: clamp(28px, 8vw, 44px);
      }

      .band {
        margin: 2rem 0;
        padding: 1rem 6vw;
      }

      .band-text {
        font-size: clamp(24px, 7vw, 40px);
      }

      .locations {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }
  </style>
</head>

<body>

<div class="page">

  <section class="hero">
    <div>
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>

      <div class="subtitle">
        Neurofeedback & Psychotherapy
      </div>
    </div>

    <div class="right-block">
      <div class="launch">
        Coming to<br>
        <span class="city-highlight">Birr</span> and<br>
        <span class="city-highlight">Athlone</span><br>
        this<br>
        summer
      </div>

      <div class="waiting">
        Join the waiting list —
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>
    </div>
  </section>

  <section class="band">
    <p class="band-text">Beyond words, regulation begins</p>
  </section>

  <section class="locations">
    <div>
      <h2 class="location-title">Birr</h2>
      <p class="place">@ The Space Above</p>
    </div>

    <div>
      <h2 class="location-title">Athlone</h2>
      <p class="place">@ The Athlone Care Clinic</p>
    </div>
  </section>

</div>

</body>
</html>
