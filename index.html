<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Neuro Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f6f3ee;
  --text: #141414;
  --muted: #7a736a;
  --line: #ddd5ca;
  --accent: #ff4d1f; /* YOUR ORANGE */
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Libre Franklin', sans-serif;
}

.page {
  max-width: 1500px;
  margin: 0 auto;
  padding: 7vh 6vw 5vh;
}

/* HERO */
.hero {
  display: grid;
  grid-template-columns: 1.3fr 0.7fr;
  gap: 6vw;
  align-items: start;
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(100px, 12vw, 200px);
  line-height: 0.85;
  margin: 0 0 1.5rem;
}

.subtitle {
  font-size: 16px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
}

.launch {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 3vw, 50px);
  line-height: 1.05;
}

.city {
  color: var(--accent);
}

.waiting {
  margin-top: 1.5rem;
  font-size: 14px;
  color: var(--muted);
}

.waiting a {
  color: var(--text);
  border-bottom: 1px solid var(--accent);
  text-decoration: none;
}

/* ORANGE BAND */
.band {
  margin-top: 5vh;
  background: var(--accent);
  padding: 2.5vh 6vw;
}

.band-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 4vw, 64px);
  line-height: 1.1;
  color: #ffffff;
}

/* LOCATIONS */
.locations {
  margin-top: 3vh;
  padding-top: 2rem;
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: 1fr 1fr;
}

.location-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
}

.place {
  font-size: 14px;
  color: var(--accent);
}

@media (max-width: 900px) {
  .hero {
    grid-template-columns: 1fr;
  }

  .locations {
    grid-template-columns: 1fr;
    gap: 2rem;
  }

  .band-text {
    font-size: 36px;
  }
}
</style>
</head>

<body>

<div class="page">

  <section class="hero">
    <div>
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>
      <div class="subtitle">
        Neurofeedback & Psychotherapy
      </div>
    </div>

    <div>
      <div class="launch">
        Coming to <span class="city">Birr</span> and <span class="city">Athlone</span><br>
        this summer
      </div>

      <div class="waiting">
        Join the waiting list —  
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>
    </div>
  </section>

</div>

<!-- FULL WIDTH BAND -->
<section class="band">
  <div class="band-text">
    Beyond words, regulation begins
  </div>
</section>

<div class="page">

  <section class="locations">
    <div>
      <div class="location-title">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div>
      <div class="location-title">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>
  </section>

</div>

</body>
</html>
