<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Neuro Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f4ef;
  --text: #161616;
  --muted: #6f6a63;
  --soft: #948b80;
  --line: #d8d0c5;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

.page {
  width: 100%;
  max-width: 1600px;
  margin: 0 auto;
  padding: 7vh 5vw 5vh 5vw;
}

.topnote {
  font-size: clamp(13px, 1.1vw, 16px);
  letter-spacing: 0.08em;
  color: var(--soft);
  margin-bottom: 10vh;
  text-transform: uppercase;
}

.hero {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 4vw;
  align-items: start;
}

.brand {
  max-width: 950px;
}

h1 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: clamp(54px, 8vw, 132px);
  line-height: 0.94;
  letter-spacing: 0.015em;
  text-wrap: balance;
}

.subtitle {
  margin-top: 1.2rem;
  font-size: clamp(16px, 1.3vw, 22px);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.rule {
  width: min(180px, 30vw);
  height: 1px;
  background: var(--line);
  margin: 3.5rem 0 0 0;
}

.side {
  padding-top: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 3rem;
  align-items: flex-start;
}

.launch {
  max-width: 320px;
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 2.3vw, 40px);
  line-height: 1.08;
  color: var(--text);
}

.waiting {
  max-width: 300px;
  font-size: clamp(14px, 1vw, 16px);
  line-height: 1.7;
  color: var(--muted);
}

.waiting a,
.place a,
.email a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s ease, opacity 0.2s ease;
}

.waiting a:hover,
.place a:hover,
.email a:hover {
  border-color: currentColor;
  opacity: 0.75;
}

.locations {
  margin-top: 14vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3vw;
  align-items: start;
}

.location {
  padding-top: 1.5rem;
  border-top: 1px solid var(--line);
}

.city {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 3.2vw, 56px);
  line-height: 1;
  margin-bottom: 0.8rem;
}

.place {
  font-size: clamp(15px, 1.1vw, 18px);
  line-height: 1.6;
  color: var(--muted);
}

.footer {
  margin-top: 14vh;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--line);
}

.footer-note {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--soft);
}

.email {
  font-size: clamp(16px, 1.3vw, 22px);
  color: var(--text);
}

/* mobile */
@media (max-width: 900px) {
  .page {
    padding: 5vh 6vw 5vh 6vw;
  }

  .topnote {
    margin-bottom: 6vh;
  }

  .hero {
    grid-template-columns: 1fr;
    gap: 2.5rem;
  }

  .side {
    padding-top: 0;
    gap: 2rem;
  }

  .launch,
  .waiting {
    max-width: none;
  }

  .locations {
    grid-template-columns: 1fr;
    gap: 2rem;
    margin-top: 10vh;
  }

  .footer {
    margin-top: 10vh;
    flex-direction: column;
    align-items: flex-start;
  }

  h1 {
    max-width: 10ch;
  }
}
</style>
</head>
<body>

<div class="page">

  <div class="topnote">Neurofeedback & Psychotherapy</div>

  <section class="hero">
    <div class="brand">
      <h1>THE NEURO CENTRE</h1>
      <div class="rule"></div>
    </div>

    <div class="side">
      <div class="launch">Coming to Birr and Athlone this summer</div>

      <div class="waiting">
        You are welcome to join our waiting list.
      </div>
    </div>
  </section>

  <section class="locations">
    <div class="location">
      <div class="city">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div class="location">
      <div class="city">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-note">Enquiries</div>
    <div class="email"><a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a></div>
  </footer>

</div>

</body>
</html>
