<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #6f685f;
      --line: #ddd5ca;
      --accent: #f05a28;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 8vh 6vw;
      position: relative;
      overflow: hidden;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 4vw;
      align-items: start;
      min-height: 75vh;
    }

    /* LEFT SIDE */

    .left-block {
      position: relative;
      z-index: 2;
      max-width: 750px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(96px, 11vw, 190px);
      line-height: 0.82;
      letter-spacing: -0.03em;
      margin: 0 0 1.4rem 0;
    }

    .subtitle {
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 1.5rem;
    }

    /* RIGHT SIDE */

    .right-block {
      position: relative;
      z-index: 2;
      padding-top: 14vh;
      max-width: 420px;
      justify-self: end;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-size: clamp(34px, 3vw, 54px);
      line-height: 1.04;
      margin-bottom: 1.6rem;
    }

    .city-highlight {
      color: var(--accent);
    }

    .nowrap {
      white-space: nowrap;
    }

    .waiting {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .waiting a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    .cta {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 14px 24px;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* BRAIN LOGO */

    .brain-wrap {
      position: absolute;
      right: -8vw;
      top: -2vh;
      width: 60vw;
      max-width: 900px;
      opacity: 0.9;
      z-index: 1;
      pointer-events: none;
    }

    .brain-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* LOCATIONS */

    .locations {
      margin-top: 10vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6vw;
      padding-top: 2rem;
      border-top: 1px solid var(--line);
      position: relative;
      z-index: 2;
    }

    .city {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(24px, 1.8vw, 34px);
      margin-bottom: 6px;
    }

    .place {
      font-size: 14px;
      color: var(--accent);
    }

    /* MOBILE */

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .brain-wrap {
        position: relative;
        right: auto;
        top: auto;
        width: 100%;
        max-width: 500px;
        margin: 2rem auto;
      }

      .right-block {
        padding-top: 2rem;
        justify-self: start;
      }

      .locations {
        grid-template-columns: 1fr;
        gap: 2rem;
        margin-top: 6vh;
      }
    }

  </style>
</head>

<body>

<div class="page">

  <section class="hero">

    <div class="left-block">
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>

      <div class="subtitle">
        Neurofeedback & Psychotherapy
      </div>
    </div>

    <!-- YOUR REAL LOGO -->
    <div class="brain-wrap">
      <img src="https://i.ibb.co/HTjGvkCh/final-icon.png" alt="Neuro Centre Brain">
    </div>

    <div class="right-block">
      <div class="launch">
        Coming to <span class="city-highlight">Birr</span> and <span class="city-highlight">Athlone</span><br>
        <span class="nowrap">this summer</span>
      </div>

      <div class="waiting">
        Join the waiting list —
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>

      <a class="cta" href="mailto:info@neurocentre.ie">
        Join the waiting list
      </a>
    </div>

  </section>

  <section class="locations">
    <div>
      <div class="city">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div>
      <div class="city">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>
  </section>

</div>

</body>
</html>
