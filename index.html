<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">

<title>The Neuro Centre</title>

<style>
:root {
  --bg: #f6f3ee;
  --text: #141414;
  --muted: #7a736a;
  --accent: #ff5a1f;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Libre Franklin', sans-serif;
  overflow-x: hidden;
}

/* PAGE */
.page {
  max-width: 1500px;
  margin: 0 auto;
  padding: 4vh 6vw 1.2vh 6vw;
}

/* HERO */
.hero {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 6vw;
  align-items: start;
}

.title {
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: clamp(95px, 11.5vw, 195px);
  line-height: 0.85;
  margin: 0 0 1.1rem 0;
}

.subtitle {
  font-size: 18px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
}

/* RIGHT BLOCK */
.side {
  width: 420px;
  justify-self: end;
  padding-top: 0.4vh;
}

.launch {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 3vw, 54px);
  line-height: 1.02;
  margin: 0 0 1.4rem 0;
}

.city-highlight {
  font-family: 'Libre Franklin', sans-serif;
  color: var(--accent);
}

.waiting {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}

.waiting a {
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--accent);
}

/* LOWER BLOCK (THIS IS THE ONLY REAL CHANGE) */
.lower-block {
  margin-top: 10px; /* 👈 moves band + locations DOWN together */
}

/* ORANGE BAND */
.band {
  position: relative;
  left: 50%;
  margin-left: -50vw;
  width: 100vw;

  background: var(--accent);
  padding: 1.35rem 0;

  margin-bottom: 0.5rem;
}

.band-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 3vw, 46px);
  color: white;
  padding-left: 6vw;
}

/* LOCATIONS */
.locations {
  display: grid;
  grid-template-columns: 1fr 1fr;
  margin-top: 0.4rem;
}

.locations h3 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  margin: 0 0 0.2rem 0;
}

.locations p {
  margin: 0;
  font-size: 14px;
  color: var(--accent);
}

</style>
</head>

<body>

<div class="page">

  <div class="hero">

    <div>
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>

      <div class="subtitle">
        NEUROFEEDBACK & PSYCHOTHERAPY
      </div>
    </div>

    <div class="side">
      <h2 class="launch">
        Coming to<br>
        <span class="city-highlight">Birr</span> and<br>
        <span class="city-highlight">Athlone</span><br>
        this summer
      </h2>

      <div class="waiting">
        Join the waiting list —<br>
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>
    </div>

  </div>

  <!-- LOWER BLOCK MOVED TOGETHER -->
  <div class="lower-block">

    <div class="band">
      <div class="band-text">
        Beyond words, regulation begins
      </div>
    </div>

    <div class="locations">
      <div>
        <h3>Birr</h3>
        <p>@ The Space Above</p>
      </div>
      <div>
        <h3>Athlone</h3>
        <p>@ The Athlone Care Clinic</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
