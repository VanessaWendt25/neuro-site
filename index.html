<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #7a736a;
      --line: #ddd5ca;
      --accent: #ff4d1f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 9vh 7vw;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 6vw;
      align-items: start;
      position: relative;
    }

    /* LEFT SIDE */

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(100px, 12vw, 200px);
      line-height: 0.85;
      margin: 0 0 2rem 0;
    }

    .subtitle {
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* RIGHT SIDE */

    .right-block {
      position: relative;
      padding-top: 2vh;
    }

    /* HORIZONTAL BAND */

    .band {
      position: absolute;
      left: -20%;
      right: 0;
      top: 35%;
      height: 160px;
      background: var(--accent);
      z-index: 0;
    }

    .launch {
      position: relative;
      z-index: 1;
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 3vw, 54px);
      line-height: 1.05;
      max-width: 380px;
    }

    .city-highlight {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 300;
      color: var(--bg);
    }

    .waiting {
      margin-top: 2rem;
      font-size: 14px;
      color: var(--muted);
    }

    .waiting a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    /* LOCATIONS */

    .locations {
      margin-top: 12vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6vw;
      padding-top: 2rem;
      border-top: 1px solid var(--line);
    }

    .city {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .place {
      font-size: 14px;
      color: var(--accent);
    }

    /* MOBILE */

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .band {
        left: 0;
        top: 50%;
      }

      .launch {
        margin-top: 2rem;
      }
    }

  </style>
</head>

<body>

<div class="page">

  <section class="hero">

    <!-- LEFT -->
    <div>
      <h1 class="title">
        THE<br>
        NEURO<br>
        CENTRE
      </h1>

      <div class="subtitle">
        Neurofeedback & Psychotherapy
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-block">

      <div class="band"></div>

      <div class="launch">
        Coming to <span class="city-highlight">Birr</span> and <span class="city-highlight">Athlone</span><br>
        this summer
      </div>

      <div class="waiting">
        Join the waiting list —
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>

    </div>

  </section>

  <section class="locations">

    <div>
      <div class="city">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div>
      <div class="city">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>

  </section>

</div>

</body>
</html>
