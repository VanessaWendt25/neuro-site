<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #7a736a;
      --accent: #ff5a1f;
      --band-text: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: calc(4vh + 10px) 6vw 1.2vh 6vw;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 6vw;
      align-items: start;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(95px, 11.5vw, 195px);
      line-height: 0.85;
      margin: 0 0 1.1rem 0;
    }

    .subtitle {
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .side {
      width: 420px;
      justify-self: end;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 3vw, 54px);
      line-height: 1.02;
      position: relative;
      top: 16px;
      left: 16px;
    }

    .city-highlight {
      color: var(--accent);
    }

    .waiting {
      font-size: 14px;
      color: var(--muted);
      position: relative;
      top: 16px;
      left: 16px;
    }

    .waiting a {
      color: var(--text);
      border-bottom: 1px solid var(--accent);
      text-decoration: none;
    }

    .lower-block {
      margin-top: 80px;
    }

    .band {
      position: relative;
      left: 50%;
      margin-left: -50vw;
      width: 100vw;
      background: var(--accent);
      padding: 0.85rem 0;
    }

    .band-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 0 6vw;
    }

    .band-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 3vw, 46px);
      color: var(--band-text);
      margin: 0;
      line-height: 1.2;
    }

    .locations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
      margin-top: 22px;
    }

    .location-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
    }

    .place {
      font-size: 14px;
      color: var(--accent);
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .side {
        width: 100%;
        max-width: 420px;
        justify-self: start;
      }

      .title {
        font-size: clamp(70px, 18vw, 130px);
      }

      .band-text {
        font-size: clamp(26px, 7vw, 40px);
      }

      .locations {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="page">
    <section class="hero">
      <div>
        <h1 class="title">
          THE<br>NEURO<br>CENTRE
        </h1>

        <div class="subtitle">
          NEUROFEEDBACK &amp; PSYCHOTHERAPY
        </div>
      </div>

      <div class="side">
        <div class="launch">
          Coming to<br>
          <span class="city-highlight">Birr</span> and<br>
          <span class="city-highlight">Athlone</span><br>
          this summer
        </div>

        <p class="waiting">
          Join the waiting list —
          <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
        </p>
      </div>
    </section>

    <div class="lower-block">
      <section class="band">
        <div class="band-inner">
          <p class="band-text">Beyond words, regulation begins...</p>
        </div>
      </section>

      <section class="locations">
        <div>
          <h2 class="location-title">Birr</h2>
          <p class="place">@ The Space Above</p>
        </div>

        <div>
          <h2 class="location-title">Athlone</h2>
          <p class="place">@ The Athlone Care Clinic</p>
        </div>
      </section>
    </div>
  </div>

  <script>
    const colours = [
      "#ff5a1f", // orange
      "#0057ff", // blue
      "#00a86b", // green
      "#d1006c", // fuchsia
      "#b30000", // red
      "#6a00ff", // violet
      "#c99700", // premium gold
      "#d4a017"  // champagne gold
    ];

    const goldColours = ["#c99700", "#d4a017"];

    const randomColour = colours[Math.floor(Math.random() * colours.length)];

    document.documentElement.style.setProperty('--accent', randomColour);

    // switch text colour for gold
    if (goldColours.includes(randomColour)) {
      document.documentElement.style.setProperty('--band-text', '#000000');
    } else {
      document.documentElement.style.setProperty('--band-text', '#ffffff');
    }
  </script>

</body>
</html>
