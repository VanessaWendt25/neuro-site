<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Neuro Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f4ef;
  --text: #141414;
  --muted: #7a746b;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

/* PAGE */
.page {
  padding: 8vh 6vw;
  max-width: 1600px;
  margin: 0 auto;
}

/* TOP */
.topnote {
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12vh;
}

/* HERO */
.hero {
  display: grid;
  grid-template-columns: 1.3fr 0.7fr;
  align-items: start;
}

/* TITLE */
h1 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-weight: 600;
  font-size: clamp(80px, 10vw, 160px);
  line-height: 0.88;
  letter-spacing: 0.01em;
}

/* RIGHT SIDE */
.side {
  margin-top: 2vh;
  padding-left: 2vw;
}

/* BIG STATEMENT */
.launch {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 2.6vw, 44px);
  line-height: 1.1;
  margin-bottom: 2.5rem;
}

/* SMALL TEXT */
.waiting {
  font-size: 14px;
  color: var(--muted);
}

/* LOCATIONS */
.locations {
  margin-top: 18vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* INTENTIONALLY UNBALANCED */
.location-left {
  transform: translateY(40px);
}

.location-right {
  text-align: right;
}

.city {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 3vw, 60px);
  margin-bottom: 6px;
}

.place {
  font-size: 15px;
  color: var(--muted);
}

/* FOOTER */
.footer {
  margin-top: 18vh;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.footer-note {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.email {
  font-size: clamp(16px, 1.2vw, 22px);
}

/* LINKS */
a {
  color: inherit;
  text-decoration: none;
  opacity: 1;
  transition: opacity 0.2s ease;
}

a:hover {
  opacity: 0.6;
}

/* MOBILE */
@media (max-width: 900px) {

  .hero {
    grid-template-columns: 1fr;
  }

  .side {
    margin-top: 3rem;
    padding-left: 0;
  }

  h1 {
    font-size: clamp(56px, 14vw, 90px);
  }

  .locations {
    grid-template-columns: 1fr;
    gap: 3rem;
    margin-top: 12vh;
  }

  .location-left,
  .location-right {
    transform: none;
    text-align: left;
  }

  .footer {
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
    margin-top: 12vh;
  }
}
</style>
</head>

<body>

<div class="page">

  <div class="topnote">Neurofeedback & Psychotherapy</div>

  <section class="hero">

    <div>
      <h1>THE NEURO CENTRE</h1>
    </div>

    <div class="side">
      <div class="launch">
        Coming to Birr and Athlone this summer
      </div>

      <div class="waiting">
        You are welcome to join our waiting list.
      </div>
    </div>

  </section>

  <section class="locations">

    <div class="location-left">
      <div class="city">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div class="location-right">
      <div class="city">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>

  </section>

  <footer class="footer">
    <div class="footer-note">Enquiries</div>
    <div class="email">
      <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
    </div>
  </footer>

</div>

</body>
</html>
