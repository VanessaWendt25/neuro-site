<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Neuro Centre</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f3ee;
      --text: #141414;
      --muted: #7a736a;
      --accent: #ff5a1f;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Libre Franklin', sans-serif;
      overflow-x: hidden;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 4vh 6vw 1.2vh 6vw;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 6vw;
      align-items: start;
      margin-bottom: 0.4rem;
    }

    .left-block {
      min-width: 0;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: clamp(95px, 11.5vw, 195px);
      line-height: 0.85;
      margin: 0 0 1.1rem 0;
    }

    .subtitle {
      font-size: 18px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .side {
      width: 420px;
      max-width: 420px;
      justify-self: end;
      padding-top: 0.4vh;
    }

    .launch {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 3vw, 54px);
      line-height: 1.02;
      margin: 0 0 1.4rem 0;
    }

    .city-highlight {
      font-family: 'Libre Franklin', sans-serif;
      font-weight: 400;
      color: var(--accent);
    }

    .waiting {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    .waiting a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    .band {
      position: relative;
      left: 50%;
      margin-left: -50vw;
      width: 100vw;

      margin-top: 1.75rem;   /* moved slightly down again */
      margin-bottom: 0.45rem;

      background: var(--accent);
      padding: 1.35rem 0;    /* slightly thinner */
    }

    .band-inner {
      max-width: 1500px;
      margin: 0 auto;
      padding: 0 6vw;
    }

    .band-text {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(40px, 4vw, 70px);
      line-height: 1.03;
      color: #ffffff;
      margin: 0;
    }

    .locations {
      margin-top: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
      padding-top: 0;
      border-top: none;
    }

    .city {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: clamp(24px, 1.8vw, 34px);
      margin: 0 0 4px 0;
    }

    .place {
      font-size: 14px;
      color: var(--accent);
      margin: 0;
    }

    @media (max-width: 1100px) {
      .hero {
        grid-template-columns: 1fr 360px;
      }

      .side {
        width: 360px;
        max-width: 360px;
      }

      .title {
        font-size: clamp(90px, 10.5vw, 180px);
      }
    }

    @media (max-width: 900px) {
      .page {
        padding: 5vh 6vw 2vh 6vw;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 2rem;
        margin-bottom: 0.3rem;
      }

      .side {
        width: 100%;
        max-width: 420px;
        justify-self: start;
        padding-top: 0;
      }

      .title {
        font-size: clamp(70px, 18vw, 130px);
      }

      .launch {
        font-size: clamp(32px, 8vw, 48px);
      }

      .band {
        margin-top: 1.4rem;
        margin-bottom: 0.35rem;
        padding: 1.1rem 0;
      }

      .band-text {
        font-size: clamp(30px, 8vw, 44px);
      }

      .locations {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <section class="hero">
      <div class="left-block">
        <h1 class="title">
          THE<br>
          NEURO<br>
          CENTRE
        </h1>

        <div class="subtitle">
          Neurofeedback &amp; Psychotherapy
        </div>
      </div>

      <div class="side">
        <div class="launch">
          Coming to<br>
          <span class="city-highlight">Birr</span> and<br>
          <span class="city-highlight">Athlone</span><br>
          this<br>
          summer
        </div>

        <div class="waiting">
          Join the waiting list —
          <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
        </div>
      </div>
    </section>

  </div>

  <section class="band">
    <div class="band-inner">
      <p class="band-text">Beyond words, regulation begins</p>
    </div>
  </section>

  <div class="page">

    <section class="locations">
      <div>
        <h2 class="city">Birr</h2>
        <p class="place">@ The Space Above</p>
      </div>

      <div>
        <h2 class="city">Athlone</h2>
        <p class="place">@ The Athlone Care Clinic</p>
      </div>
    </section>

  </div>

</body>
</html>
