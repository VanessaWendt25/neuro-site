<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Neuro Centre</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f7f4ef;
  --text: #141414;
  --muted: #7a746b;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
}

/* PAGE */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 10vh 6vw 6vh 6vw;
}

/* TOP NOTE */
.topnote {
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8vh;
}

/* HERO */
.hero {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 4vw;
  align-items: start;
}

/* TITLE */
h1 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-size: clamp(60px, 7vw, 110px);
  line-height: 0.95;
  letter-spacing: 0.02em;
}

/* RIGHT SIDE */
.side {
  padding-top: 1vh;
}

/* LAUNCH TEXT */
.launch {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 2vw, 34px);
  line-height: 1.2;
  margin-bottom: 2rem;
}

/* WAITING LIST */
.waiting {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.7;
}

/* LINKS */
a {
  color: inherit;
  text-decoration: none;
  transition: opacity 0.2s ease;
}

a:hover {
  opacity: 0.6;
}

/* LOCATIONS */
.locations {
  margin-top: 12vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4vw;
}

.location {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.city {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
}

.place {
  font-size: 15px;
  color: var(--muted);
}

/* FOOTER */
.footer {
  margin-top: 12vh;
  font-size: 16px;
}

/* MOBILE */
@media (max-width: 900px) {

  .hero {
    grid-template-columns: 1fr;
    gap: 2.5rem;
  }

  .locations {
    grid-template-columns: 1fr;
    gap: 2rem;
  }

  h1 {
    font-size: clamp(48px, 12vw, 72px);
  }

}
</style>
</head>

<body>

<div class="page">

  <div class="topnote">Neurofeedback & Psychotherapy</div>

  <section class="hero">

    <div>
      <h1>THE NEURO CENTRE</h1>
    </div>

    <div class="side">

      <div class="launch">
        Coming to Birr and Athlone this summer
      </div>

      <div class="waiting">
        Join the waiting list — 
        <a href="mailto:info@neurocentre.ie">info@neurocentre.ie</a>
      </div>

    </div>

  </section>

  <section class="locations">

    <div class="location">
      <div class="city">Birr</div>
      <div class="place">@ The Space Above</div>
    </div>

    <div class="location">
      <div class="city">Athlone</div>
      <div class="place">@ The Athlone Care Clinic</div>
    </div>

  </section>

</div>

</body>
</html>
